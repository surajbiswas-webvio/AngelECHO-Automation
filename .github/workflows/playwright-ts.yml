name: Playwright TypeScript Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        env:
          BASE_URL: https://staging-app.webvio.in/
          API_BASE_URL: https://staging-api.angelecho.ai/v1/
          CUSTOMER_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
          CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
          HEADLESS: "true"
          ALLOW_KNOWN_DEFECTS: "true"
        run: npm run test:smoke

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ts-reports
          path: |
            reports/
            test-results/
