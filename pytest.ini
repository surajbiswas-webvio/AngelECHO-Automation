[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --html=reports/html-report.html
    --self-contained-html
    --alluredir=reports/allure-results
    --reruns 1
    --reruns-delay 2
markers =
    smoke: critical path checks suitable for every deployment
    regression: broader regression suite
    e2e: end-to-end workflow tests
    api: API-level tests
    crud: create/read/update/delete workflow checks
    negative: negative and validation scenarios
    permissions: permission and role-based access checks
    session: authentication and session management checks
    ui: visual and UI state validations
log_cli = false
log_level = INFO
